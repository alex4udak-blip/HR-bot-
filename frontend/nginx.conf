server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to backend.
    # На Saturn нет внутреннего DNS-имени "backend" → раньше nginx падал на
    # старте ([emerg] host not found in upstream "backend:8000"). Решение:
    #  - resolver + переменная в proxy_pass → DNS резолвится в рантайме, а не
    #    при загрузке конфига, поэтому nginx стартует даже если бэк ещё не
    #    поднялся;
    #  - проксируем на ПУБЛИЧНЫЙ URL бэкенда (гарантированно резолвится),
    #    что убирает зависимость от внутренней сети платформы.
    location /api {
        resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
        set $backend_host enceladus-ns9s2o.saturn.ac;
        proxy_pass https://$backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket (realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # SPA routing - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
