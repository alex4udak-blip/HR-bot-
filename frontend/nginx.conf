server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # CSV/файловый импорт: дефолтный лимит nginx (1MB) резал загрузки >1MB
    # на 413 ещё до бэкенда. Кандидатские выгрузки бывают крупнее.
    client_max_body_size 50M;

    # API proxy to backend.
    # На Saturn нет внутреннего DNS-имени "backend" → раньше nginx падал на
    # старте ([emerg] host not found in upstream "backend:8000"). Решение:
    #  - resolver + переменная в proxy_pass → DNS резолвится в рантайме, а не
    #    при загрузке конфига, поэтому nginx стартует даже если бэк ещё не
    #    поднялся;
    #  - проксируем на ПУБЛИЧНЫЙ URL бэкенда (гарантированно резолвится),
    #    что убирает зависимость от внутренней сети платформы.
    location /api {
        resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
        set $backend_host enceladus-ns9s2o.saturn.ac;
        proxy_pass https://$backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket (realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Хэшированные ассеты (имя содержит хэш сборки, напр. index-BvBiNnjj.js) —
    # кэшируем на год + immutable. При новом деплое имя файла меняется, поэтому
    # старый кэш безопасен и никогда не «прилипает».
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html — НИКОГДА не кэшируем: браузер всегда ревалидирует и сразу
    # подхватывает новый деплой (новый хэш бандла) БЕЗ ручного Ctrl+Shift+R.
    # Это убирает многолетнюю боль «после деплоя ничего не поменялось».
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA routing - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
